version: '3.9'
services:
  mongo:
    image: mongo:7
    container_name: iot_mongo
    restart: unless-stopped
    ports:
      - "27017:27017"
    volumes:
      - mongo_data:/data/db

  mosquitto:
    image: eclipse-mosquitto:2
    container_name: iot_mosquitto
    restart: unless-stopped
    ports:
      - "1883:1883"
      - "9001:9001"
    volumes:
      - ./mosquitto/mosquitto.conf:/mosquitto/config/mosquitto.conf:ro

  backend:
    build:
      context: ./iot2025back-main
    container_name: iot_backend
    restart: unless-stopped
    env_file:
      - ./iot2025back-main/.env
    environment:
      - MONGO_URI=mongodb://mongo:27017/iot2025
      - MQTT_HOST=mosquitto
      - MQTT_PORT=1883
      - MQTT_PROTOCOL=mqtt
    ports:
      - "3000:3000"
    depends_on:
      - mongo
      - mosquitto

  frontend:
    build:
      context: ./iot2025front-master
      args:
        - VITE_API_URL=http://localhost:3000
    container_name: iot_frontend
    restart: unless-stopped
    environment: []
    ports:
      - "5173:80"
    depends_on:
      - backend

volumes:
  mongo_data:
